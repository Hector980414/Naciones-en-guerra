<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#060810" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Naciones en Guerra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
      html, body {
        background: #060810;
        overscroll-behavior: none;
        height: 100%;
        width: 100%;
        font-family: 'Rajdhani', sans-serif;
        color: #f0ece0;
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100%; }
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }
      input, select, textarea, button { font-family: 'Rajdhani', sans-serif; }

      /* Textura de fondo global sutil */
      body::before {
        content: '';
        position: fixed; inset: 0; pointer-events: none; z-index: 0;
        background:
          radial-gradient(ellipse 100% 40% at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 60%),
          repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(201,168,76,0.02) 50px),
          repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(201,168,76,0.015) 50px);
      }

      /* Animaciones globales */
      @keyframes pulse-glow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      @keyframes slideInDown {
        from { transform: translateY(-20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      @keyframes countUp {
        from { transform: scale(1.3); opacity:0; }
        to { transform: scale(1); opacity:1; }
      }
      @keyframes barFill {
        from { width: 0%; }
        to { width: var(--bar-width); }
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
      }
      @keyframes popIn {
        0% { transform: scale(0.5); opacity:0; }
        70% { transform: scale(1.1); }
        100% { transform: scale(1); opacity:1; }
      }
      @keyframes pop-in {
        0% { transform: scale(0.6) translateX(20px); opacity:0; }
        80% { transform: scale(1.05) translateX(0); }
        100% { transform: scale(1) translateX(0); opacity:1; }
      }
      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }
      @keyframes number-glow {
        0%,100% { text-shadow: 0 0 4px currentColor; }
        50% { text-shadow: 0 0 12px currentColor, 0 0 24px currentColor; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
